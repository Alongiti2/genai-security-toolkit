name: GenAI Security Scan

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run GenAI Security Scanner
        run: python scanner/main.py --target scanner/sample_report.json

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: sample_report.json
